services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: bookworm
      POSTGRES_PASSWORD: bookworm
      POSTGRES_DB: bookworm
    ports:
      - "5632:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  pgdata:
  ollama_models:
